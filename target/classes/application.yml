server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ecommerce_db
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html