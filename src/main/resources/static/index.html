<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Native E-commerce Demo</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container">
    <h1>E-commerce Demo</h1>

    <section class="card">
        <h2>1) Login</h2>
        <div class="row">
            <input id="username" type="text" placeholder="Username (e.g. demo)" />
            <input id="password" type="password" placeholder="Password (default: password123)" />
            <button id="loginBtn">Login</button>
        </div>
        <p id="loginResult" class="result"></p>
    </section>

    <section class="card">
        <h2>2) Browse Products</h2>
        <button id="loadProductsBtn">Load Products</button>
        <ul id="productList"></ul>
    </section>

    <section class="card">
        <h2>3) Create Order</h2>
        <p>Input product IDs separated by comma, e.g. 1,2</p>
        <div class="row">
            <input id="orderProductIds" type="text" placeholder="1,2" />
            <button id="createOrderBtn">Create Order</button>
            <button id="loadOrdersBtn">Load My Orders</button>
        </div>
        <pre id="orderResult" class="result"></pre>
    </section>

    <section class="card">
        <h2>API Documentation</h2>
        <p>Open Swagger UI at <a href="/swagger-ui.html" target="_blank">/swagger-ui.html</a></p>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
